
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Part 2 - Didactics of Geometry and Measurement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
            color: #f8fafc;
        }
        .quiz-container {
            background-color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .option-btn {
            background-color: #334155;
            color: #f1f5f9;
            border-color: #475569;
        }
        .option-btn:hover:not(.disabled-btn) {
            background-color: #475569;
        }
        .correct-answer {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #059669 !important;
        }
        .wrong-answer {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #dc2626 !important;
        }
        .disabled-btn {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-screen" class="quiz-container rounded-2xl p-6 md:p-10 max-w-3xl w-full border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-red-400">الجزء الثاني: تحدي الهندسة والقياس (16-30)</h1>
        </div>
        
        <div class="flex justify-between items-center mb-6">
            <span class="text-red-400 font-bold bg-red-950 py-1 px-4 rounded-full border border-red-800" id="question-counter">سؤال 1 / 15</span>
            <span class="text-green-400 font-bold bg-green-950 py-1 px-4 rounded-full border border-green-800" id="score-display">النقاط: 0</span>
        </div>
        
        <div class="w-full bg-slate-700 rounded-full h-2.5 mb-8">
            <div id="progress-bar" class="bg-red-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <h2 id="question-text" class="text-xl font-bold text-white mb-8 leading-relaxed">جاري التحميل...</h2>
        
        <div id="options-container" class="space-y-4"></div>

        <div id="feedback-container" class="mt-6 hidden">
            <p id="feedback-text" class="font-bold text-lg mb-4"></p>
            <button id="next-btn" onclick="nextQuestion()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 hidden">
                السؤال التالي
            </button>
        </div>
    </div>

    <script>
        const questionsPart2 = [
            {
                q: "16. الخطوة التأسيسية الأولى في التدرج الديداكتيكي لبناء مفهوم القياس هي:",
                options: ["A. المقارنة المباشرة", "B. الإدراك الحسي والتقدير", "C. القياس بواسطة وحدة اعتباطية", "D. القياس بواسطة وحدة معيارية عالمية"],
                ans: 1 
            },
            {
                q: "17. ما هو الهدف الديداكتيكي الدقيق لمرحلة الإدراك الحسي في القياس؟",
                options: ["A. حفظ جدول التحويلات المتري", "B. عزل المقدار المستهدف عن باقي الخصائص الفيزيائية للشيء", "C. استخدام المسطرة المدرجة بمهارة", "D. تحويل الوحدات بشكل صحيح"],
                ans: 1 
            },
            {
                q: "18. خاصية التعدي في مقارنة الأطوال يتم بناؤها ذهنيا خلال أي مرحلة؟",
                options: ["A. القياس المعياري", "B. المقارنة المباشرة باستخدام التطابق", "C. التقدير البصري", "D. الحساب الكسري"],
                ans: 1 
            },
            {
                q: "19. الانتقال إلى استخدام الوحدة المعيارية يتم تبريره بيداغوجيا عبر خلق وضعية تبرز:",
                options: ["A. التكلفة الباهظة للوحدات الاعتباطية", "B. أزمة تواصل ناتجة عن اختلاف نتائج القياس بالوحدات الاعتباطية", "C. سهولة الضرب في عشرة", "D. ضرورة استخدام الأدوات البلاستيكية"],
                ans: 1 
            },
            {
                q: "20. نشاط المسطرة المكسورة يعتبر معالجة ديداكتيكية موجهة خصيصا لتجاوز أي عائق؟",
                options: ["A. الخلط بين المساحة والمحيط", "B. العجز عن تحويل المتر إلى سنتيمتر", "C. عد الخطوط العمودية بدلا من عد الفراغات بين الأرقام", "D. الخلط بين الحجم والكتلة"],
                ans: 2 
            },
            {
                q: "21. في تجربة بياجيه لانحفاظ السعة، سكب السائل في إناء طويل وضيق يختبر قدرة الطفل على:",
                options: ["A. قياس المليلترات بدقة", "B. إدراك أن السعة تظل ثابتة رغم تغير المستوى الظاهري للسائل", "C. حساب حجم الأسطوانة", "D. التمييز بين الكتلة والوزن"],
                ans: 1 
            },
            {
                q: "22. العائق الإبستمولوجي للحجم عند قياس الكتل يتمثل في اعتقاد المتعلم أن:",
                options: ["A. الكتلة تتغير بتغير درجة الحرارة", "B. الجسم الأكبر حجما هو الأثقل كتلة بالضرورة", "C. الكتلة تقاس فقط بالكيلوغرام", "D. الغازات ليس لها كتلة"],
                ans: 1 
            },
            {
                q: "23. ما الذي يشكل الصعوبة الكبرى في حساب مدد الزمن مقارنة بباقي المقادير؟",
                options: ["A. الزمن لا يمكن رؤيته بالعين المجردة", "B. الاعتماد على نظام مختلط ستيني واثنا عشري بدلا من النظام العشري الخالص", "C. غياب وحدات عالمية لقياس الزمن", "D. الزمن يتحرك في اتجاه واحد فقط"],
                ans: 1 
            },
            {
                q: "24. المعادلة الذهبية التي تشكل جسر الربط بين السعة والحجم في المنهاج هي:",
                options: ["A. واحد لتر يساوي واحد متر مكعب", "B. واحد لتر يساوي واحد ديسيمتر مكعب", "C. واحد مليلتر يساوي واحد ديسيمتر مكعب", "D. واحد لتر يساوي واحد سنتيمتر مكعب"],
                ans: 1 
            },
            {
                q: "25. ديداكتيكيا، كيف ينبغي تقديم مفهوم المساحة قبل إعطاء الصيغة الرياضية؟",
                options: ["A. عبر حفظ جدول الضرب", "B. عبر عملية تغطية سطح ما ببلاطات اعتباطية وتكميمها", "C. عبر حساب المحيط وقسمته على اثنان", "D. عبر رسم أقطار المضلع"],
                ans: 1 
            },
            {
                q: "26. التبرير البيداغوجي لتخصيص خانتين لكل وحدة في جدول تحويلات المساحة ينبني على:",
                options: ["A. اتفاق اعتباطي بحت لجعل الحساب أكثر تعقيدا", "B. الواقع الهندسي المتمثل في كون المربع المتري يتضمن مئة مربع من الوحدة الأصغر مباشرة", "C. كون المساحة مفهوما ثنائي الأبعاد يتطلب الجمع", "D. ضرورة فصل الطول عن العرض بصريا"],
                ans: 1 
            },
            {
                q: "27. تدريس النقود والعملات يشكل المدخل الواقعي والتطبيقي الأول لتقديم:",
                options: ["A. الهندسة الإقليدية", "B. الأعداد العشرية قبل التطرق لها بشكل نظري مجرد", "C. مفهوم اللانهاية", "D. المعادلات الجبرية"],
                ans: 1 
            },
            {
                q: "28. طريقة البقال في رد الصرف تنمي بالأساس أي مهارة في الحساب الذهني؟",
                options: ["A. الطرح العمودي الاعتيادي", "B. الجمع التصاعدي وصولا إلى العدد المستهدف", "C. القسمة المطولة", "D. الضرب التقاطعي"],
                ans: 1 
            },
            {
                q: "29. في سياق المحيط والمساحة، المثال المضاد المتمثل في قطع زاوية من مربع من ورق مقوى يبرهن للمتعلم على أن:",
                options: ["A. المساحة والمحيط ينقصان معا بشكل متناسب", "B. المساحة تنقص بينما المحيط يمكن أن يظل ثابتا دون تغيير", "C. المحيط يزداد بينما المساحة تظل ثابتة", "D. المساحة والمحيط يصبحان مستحيلي الحساب"],
                ans: 1 
            },
            {
                q: "30. ما هو الفرق الديداكتيكي الجوهري بين السعة والحجم كما يدرس في السلك الابتدائي؟",
                options: ["A. السعة مفهوم داخلي بينما الحجم مفهوم خارجي", "B. السعة تقيس الأجسام الصلبة بينما الحجم يقيس السوائل", "C. السعة تستخدم المتر المكعب بينما الحجم يستخدم اللتر", "D. السعة ثابتة بينما الحجم يتغير بتغير درجة الحرارة"],
                ans: 0 
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            const currentQ = questionsPart2[currentQuestionIndex];
            
            document.getElementById('question-counter').innerText = `سؤال ${currentQuestionIndex + 1} / ${questionsPart2.length}`;
            document.getElementById('score-display').innerText = `النقاط: ${score}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / questionsPart2.length) * 100}%`;
            
            document.getElementById('question-text').innerText = currentQ.q;
            
            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-right border-2 font-semibold py-4 px-6 rounded-xl transition duration-300 transform hover:-translate-y-1";
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, selectedBtn) {
            if (answered) return;
            answered = true;

            const currentQ = questionsPart2[currentQuestionIndex];
            const allButtons = document.getElementById('options-container').children;

            for (let btn of allButtons) {
                btn.classList.add('disabled-btn');
                btn.classList.remove('hover:-translate-y-1');
            }

            const feedbackText = document.getElementById('feedback-text');
            if (selectedIndex === currentQ.ans) {
                selectedBtn.classList.add('correct-answer');
                score++;
                document.getElementById('score-display').innerText = `النقاط: ${score}`;
                feedbackText.innerText = "إجابة دقيقة! 🎯";
                feedbackText.className = "font-bold text-xl mb-4 text-green-400";
            } else {
                selectedBtn.classList.add('wrong-answer');
                allButtons[currentQ.ans].classList.add('correct-answer');
                feedbackText.innerText = "إجابة خاطئة!";
                feedbackText.className = "font-bold text-xl mb-4 text-red-400";
            }

            document.getElementById('feedback-container').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsPart2.length) {
                loadQuestion();
            } else {
                document.getElementById('quiz-screen').innerHTML = `
                    <div class="text-center p-8">
                        <h1 class="text-4xl font-bold text-white mb-4">انتهى التحدي الكامل!</h1>
                        <p class="text-xl text-slate-300 mb-6">نتيجتك في الجزء الثاني: <span class="text-red-500 font-black text-4xl">${score} / 15</span></p>
                        <p class="text-lg text-slate-400">أتمنى أن يكون الاختبار مفيداً لك في مراجعتك.</p>
                        <button onclick="location.reload()" class="mt-8 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full text-xl transition duration-300 shadow-lg">
                            إعادة الجزء الثاني
                        </button>
                    </div>
                `;
            }
        }

        // Start automatically
        window.onload = loadQuestion;
    </script>
</body>
</html>
