<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Part 1 - Didactics of Geometry and Measurement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
            color: #f8fafc;
        }
        .quiz-container {
            background-color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .option-btn {
            background-color: #334155;

            border-color: #059669 !important;
        }
        .wrong-answer {
            background-color: #ef4444 !important;

<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-screen" class="quiz-container rounded-2xl p-6 md:p-10 max-w-3xl w-full border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-red-400">الجزء الأول: تحدي الهندسة والقياس (1-15)</h1>
        </div>
        
        <div class="flex justify-between items-center mb-6">
            <span class="text-red-400 font-bold bg-red-950 py-1 px-4 rounded-full border border-red-800" id="question-counter">سؤال 1 / 15</span>
            <span class="text-green-400 font-bold bg-green-950 py-1 px-4 rounded-full border border-green-800" id="score-display">النقاط: 0</span>
        </div>
        
        <div class="w-full bg-slate-700 rounded-full h-2.5 mb-8">
            <div id="progress-bar" class="bg-red-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <h2 id="question-text" class="text-xl font-bold text-white mb-8 leading-relaxed">جاري التحميل...</h2>
        
        <div id="options-container" class="space-y-4"></div>

        <div id="feedback-container" class="mt-6 hidden">
            <p id="feedback-text" class="font-bold text-lg mb-4"></p>
            <button id="next-btn" onclick="nextQuestion()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 hidden">
                السؤال التالي
            </button>
        </div>
    </div>

    <script>
        const questionsPart1 = [
            {
                q: "1. التحدي الديداكتيكي الجوهري في تدريس الهندسة الفضائية هو:",

                ans: 1 
            },
            {
                q: "2. حسب بروسو فيما يخص هيكلة الفضاء، ما الذي يميز الفضاء المتوسط؟",
                options: ["A. يتحكم فيه المتعلم كليا بواسطة اليد وهو جالس على الطاولة", "B. يحتاج إلى خريطة لتمثله ذهنيا وتحديد المسارات", "C. يتحرك فيه المتعلم بجسده ويدركه عبر التنقل الفعلي", "D. يمثل الأشكال الهندسية المجردة حصرا"],
                ans: 2 
            },
            {
                q: "3. في مستويات الإدراك لفان هايل، ما الذي يميز المستوى الثاني مقارنة بالمستوى الأول؟",
                options: ["A. التعرف على الشكل انطلاقا من مظهره العام", "B. وصف الخصائص المعزولة للشكل الهندسي", "C. الاستنتاج غير الشكلي وإدراك العلاقات بين الأشكال", "D. صياغة براهين رياضية صارمة"],
                ans: 2 
            },
            {
                q: "4. ما هي الوظيفة الإبستمولوجية الأساسية للبركار في الهندسة الابتدائية؟",
                options: ["A. رسم دوائر مثالية لأغراض فنية", "B. التجسيد المادي لمفهوم المحل الهندسي", "C. قياس المسافات بدقة متناهية", "D. تعويض المسطرة في التحقق من الاستقامية"],
                ans: 1 
            },
            {
                q: "5. لماذا يعتبر تقديم نشر واحد وحيد للمكعب خطأ ديداكتيكيا؟",
                options: ["A. لأن المكعب يمتلك بالضبط ستة نشور متطابقة", "B. لأنه يخلق عائق الصورة الذهنية الوحيدة بينما يمتلك المكعب أحد عشر نشرا مختلفا", "C. لأن النشور تدرس حصريا في السلك الإعدادي", "D. لأن المتعلم لا يستطيع تقطيع الورق بأمان"],
                ans: 1 
            },
            {
                q: "6. في المنظور الفرساني، ما هو التشوه البصري الأساسي الذي يتم إحداثه لتمثيل المجسم؟",
                options: ["A. المستقيمات المتوازية تتقاطع في نقطة التلاشي", "B. الوجه الأمامي يرسم على شكل معين", "C. الأحرف الجانبية ترسم أقصر من طولها الحقيقي استنادا لمعامل التصغير", "D. الزوايا القائمة يتم الحفاظ عليها في جميع الوجوه"],
                ans: 2 
            },
            {
                q: "7. في التماثل المحوري، ما هي العلاقة الهندسية بين محور التماثل والقطعة التي تربط نقطة بمماثلتها؟",
                options: ["A. المحور يوازي القطعة المذكورة", "B. المحور يشكل الواسط لهذه القطعة", "C. المحور يتقاطع مع القطعة بزاوية حادة", "D. المحور يشكل مماسا للقطعة"],
                ans: 1 
            },
            {
                q: "8. عند تكبير مضلع بمعامل معين، ماذا يحدث لقياسات زواياه؟",
                options: ["A. تضرب في نفس معامل التكبير", "B. تضرب في مربع معامل التكبير", "C. تظل ثابتة ولا يطرأ عليها أي تغيير", "D. تقسم على مقلوب معامل التكبير"],
                ans: 2 
            },
            {
                q: "9. وضعية الواصف والراسم تهدف ديداكتيكيا إلى إحداث قطيعة أساسية بين:",
                options: ["A. الرسم اليدوي والتلوين الفني", "B. اللغة العامية المتداولة واللغة الواصفة للهندسة", "C. حساب المساحة وحساب المحيط", "D. الهندسة المستوية والهندسة الفضائية"],
                ans: 1 
            },
            {
                q: "10. في نشاط الخيط ولوحة المسامير، تغيير أبعاد المستطيل مع إبقاء الخيط مشدودا يهدف إلى تفكيك أي عائق؟",
                options: ["A. تأثير الدرج", "B. النمطية الهندسية", "C. التلازم الكمي بين المحيط والمساحة", "D. عدم انحفاظ المساحة"],
                ans: 2 
            },
            {
                q: "11. عائق تأثير الدرج يكشف عن خلل مفاهيمي عميق لدى المتعلم بخصوص:",
                options: ["A. حجم الموشور القائم", "B. محيط شكل مجوف مقارنة بالمستطيل المحيط به", "C. مجموع زوايا المضلعات", "D. مساحة القرص"],
                ans: 1 
            },
            {
                q: "12. لتجاوز عائق النمطية المرتبط بالمعين والمربع، يجب على المدرس:",
                options: ["A. عرض المربعات وهي ترتكز على قاعدتها الأفقية فقط", "B. الاعتماد كليا على الإدراك البصري لتصنيف الشكل", "C. إجبار المتعلم على استخدام الأدوات الهندسية للبرهنة على الخصائص بغض النظر عن وضعية الشكل", "D. حذف المعين من المقرر الدراسي الابتدائي"],
                ans: 2 
            },
            {
                q: "13. ماذا تمثل المسطرة غير المدرجة إبستمولوجيا في البدايات الأولى للهندسة؟",
                options: ["A. مفهوم الاستقامية", "B. قياس الأطوال بالسنتيمتر", "C. إنشاء المستقيمات المتعامدة", "D. تماثل المضلعات"],
                ans: 0 
            },
            {
                q: "14. الانتقال من المستوى البصري إلى المستوى التحليلي في تصنيف فان هايل يتميز بـ:",
                options: ["A. التخلي النهائي عن الرسوم الهندسية", "B. التركيز على الشكل الكلي للمجسم", "C. تحديد وجرد الخصائص الدقيقة المكونة للشكل الهندسي", "D. فهم النظم البديهية المجردة"],
                ans: 2 
            },
            {
                q: "15. في الهندسة الفضائية، ما الذي يميز الأجسام المستديرة عن الوجوهيات من الناحية الديداكتيكية؟",
                options: ["A. تواجد الرؤوس الحادة", "B. التمييز بين خاصية التدحرج وخاصية الانزلاق", "C. إمكانية حساب الحجم الكلي", "D. عدد الوجوه المتوازية"],
                ans: 1 
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            const currentQ = questionsPart1[currentQuestionIndex];
            
            document.getElementById('question-counter').innerText = `سؤال ${currentQuestionIndex + 1} / ${questionsPart1.length}`;
            document.getElementById('score-display').innerText = `النقاط: ${score}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / questionsPart1.length) * 100}%`;
            
            document.getElementById('question-text').innerText = currentQ.q;
            
            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-right border-2 font-semibold py-4 px-6 rounded-xl transition duration-300 transform hover:-translate-y-1";
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, selectedBtn) {
            if (answered) return;
            answered = true;

            const currentQ = questionsPart1[currentQuestionIndex];
            const allButtons = document.getElementById('options-container').children;

            for (let btn of allButtons) {
                btn.classList.add('disabled-btn');
                btn.classList.remove('hover:-translate-y-1');
            }

            const feedbackText = document.getElementById('feedback-text');
            if (selectedIndex === currentQ.ans) {
                selectedBtn.classList.add('correct-answer');
                score++;
                document.getElementById('score-display').innerText = `النقاط: ${score}`;
                feedbackText.innerText = "إجابة دقيقة! 🎯";
                feedbackText.className = "font-bold text-xl mb-4 text-green-400";
            } else {
                selectedBtn.classList.add('wrong-answer');
                allButtons[currentQ.ans].classList.add('correct-answer');
                feedbackText.innerText = "إجابة خاطئة!";
                feedbackText.className = "font-bold text-xl mb-4 text-red-400";
            }

            document.getElementById('feedback-container').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsPart1.length) {
                loadQuestion();
            } else {
                document.getElementById('quiz-screen').innerHTML = `
                    <div class="text-center p-8">
                        <h1 class="text-3xl font-bold text-white mb-4">نهاية الجزء الأول</h1>
                        <p class="text-xl text-slate-300 mb-6">نتيجتك: <span class="text-red-500 font-black text-4xl">${score} / 15</span></p>
                        <p class="text-lg text-slate-400">انتقل الآن إلى ملف الجزء الثاني (الأسئلة 16-30).</p>
                    </div>
                `;
            }
        }

        // Start automatically
        window.onload = loadQuestion;
    </script>
</body>
</html>
