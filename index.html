<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة امتحانات سوسيولوجيا التربية - S2</title>
    <!-- تحميل مكتبة Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تحميل خط Cairo من جوجل لخطوط عربية جميلة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- تحميل أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9; /* لون خلفية مريح للعين */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنسيق النصوص داخل الأجوبة */
        .answer-content b {
            color: #1e40af;
            font-weight: 700;
        }
        .answer-content ul {
            list-style-type: disc;
            padding-right: 20px;
            margin-top: 10px;
        }
        .answer-content li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 text-slate-800">

    <header class="w-full max-w-4xl text-center mb-8 fade-in">
        <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-800 mb-2">
            <i class="fa-solid fa-graduation-cap ml-2"></i>منصة المراجعة التفاعلية
        </h1>
        <p class="text-lg text-slate-600 font-semibold">سوسيولوجيا التربية - الفصل الثاني (LEEP)</p>
    </header>

    <main id="app-container" class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl p-6 md:p-10 border border-slate-100 fade-in relative overflow-hidden">
        
        <!-- واجهة اختيار الامتحان -->
        <div id="exam-selection" class="block">
            <h2 class="text-2xl font-bold text-center mb-8 text-slate-700">اختر الامتحان التجريبي للبدء:</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="exams-list">
                <!-- سيتم ملء هذه المنطقة بواسطة JavaScript -->
            </div>
        </div>

        <!-- واجهة عرض السؤال والجواب -->
        <div id="quiz-area" class="hidden">
            <!-- شريط التقدم -->
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <span id="exam-title-display" class="font-bold text-indigo-700 text-lg"></span>
                <span id="question-counter" class="bg-indigo-100 text-indigo-800 py-1 px-3 rounded-full text-sm font-bold"></span>
            </div>

            <!-- حاوية السؤال -->
            <div id="question-container" class="mb-8 p-6 bg-slate-50 rounded-2xl border-r-4 border-indigo-500">
                <h3 class="text-xl font-bold mb-3 text-slate-800"><i class="fa-solid fa-circle-question ml-2 text-indigo-500"></i>السؤال:</h3>
                <p id="question-text" class="text-lg leading-relaxed text-slate-700"></p>
            </div>

            <!-- زر إظهار الجواب -->
            <div class="text-center mb-8" id="show-answer-btn-container">
                <button onclick="showAnswer()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition duration-300 shadow-lg hover:shadow-indigo-500/50 flex items-center justify-center w-full md:w-auto mx-auto transform hover:-translate-y-1">
                    <i class="fa-solid fa-eye ml-2"></i> إظهار التصحيح والمفاهيم
                </button>
            </div>

            <!-- حاوية الجواب (مخفية في البداية) -->
            <div id="answer-container" class="hidden mb-8 p-6 bg-green-50 rounded-2xl border-r-4 border-green-500 fade-in">
                <h3 class="text-xl font-bold mb-4 text-green-800"><i class="fa-solid fa-check-double ml-2"></i>الجواب الموسع:</h3>
                <div id="answer-text" class="text-md leading-loose text-slate-700 answer-content"></div>
            </div>

            <!-- أزرار التنقل -->
            <div id="navigation-buttons" class="hidden flex-row justify-between items-center pt-6 border-t border-slate-200 fade-in">
                <button onclick="returnToMenu()" class="text-slate-500 hover:text-slate-800 font-semibold py-2 px-4 transition">
                    <i class="fa-solid fa-arrow-right ml-1"></i> العودة للقائمة
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl transition duration-300 shadow-md flex items-center">
                    السؤال الموالي <i class="fa-solid fa-arrow-left mr-2"></i>
                </button>
            </div>
        </div>

    </main>

    <script>
        // قاعدة بيانات الأسئلة والأجوبة
        const examsData = [
            {
                title: "الامتحان التجريبي الأول",
                questions: [
                    {
                        question: "كيف يمكن تفسير السياسة التعليمية الطائفية والطبقية التي طبقها المستعمر في المغرب، باستخدام مفاهيم بيير بورديو (النظرية النقدية) حول 'إعادة الإنتاج' و'العنف الرمزي'؟",
                        answer: `<ul>
                            <li><b>إعادة الإنتاج عبر التعليم الطائفي:</b> حسب نظرية بيير بورديو، المدرسة لا توفر فرصاً متكافئة، بل هي آلة لإعادة إنتاج التراتبية الاجتماعية والفوارق الطبقية. هذا المفهوم يتجلى بوضوح في السياسة التعليمية التي نهجتها فرنسا في المغرب خلال فترة الحماية (1912-1956)، حيث قسمت التعليم تقسيماً طائفياً وطبقياً يخدم مصالحها. فقد وفرت "تعليم النخبة" لأبناء الأعيان والمخزن لتكوينهم في الإدارة والتجارة، بينما خصصت لطبقة جماهير المدن تعليماً يوجه نحو المهن اليدوية، ولجماهير البادية تعليماً يوجه نحو الزراعة والفلاحة. هنا نرى تطبيقاً عملياً لمفهوم "إعادة الإنتاج"، حيث تضمن هذه الهيكلة بقاء أبناء النخب في مواقع السلطة، بينما يُحكم على أبناء الفلاحين بإعادة إنتاج وضعهم الهش.</li>
                            <li><b>العنف الرمزي في التعليم الاستعماري:</b> يُعرّف بورديو العنف الرمزي بأنه سيطرة خفية تُمارس بفرض ثقافة الطبقة المهيمنة وتهميش ثقافة الآخر. تجلى هذا العنف الرمزي بوضوح في "الظهير البربري" لسنة 1930، حيث تم إنشاء مدارس فرنسية-بربرية تقصي تماماً اللغة العربية والفقهاء وأي مظهر من المظاهر الإسلامية، وتفرض اللغة والثقافة الفرنسية. هذه المدارس مارست عنفاً رمزياً بمحاولة استلاب المغاربة حضارياً، وجعل الثقافة الفرنسية هي المعيار الشرعي والوحيد للنجاح.</li>
                        </ul>`
                    },
                    {
                        question: "تعتبر سوسيولوجيا التربية المدرسة 'مجتمعاً مصغراً' يعكس التناقضات المجتمعية الكبرى. انطلاقاً من هذا الطرح، كيف تتجلى هذه التناقضات في تجربة المتعلم القروي والهوة الثقافية التي يعيشها؟",
                        answer: `<ul>
                            <li><b>المدرسة كمرآة للتناقضات:</b> يؤكد المدخل العام لسوسيولوجيا التربية أن المدرسة بمثابة "مجتمع مصغر" (microsociété) تعكس جميع التناقضات الجدلية التي يعرفها المجتمع المكبر. وبالتالي، فالمدرسة ليست فضاءً محايداً.</li>
                            <li><b>انعكاس التناقضات في المجال القروي:</b> عند إسقاط هذا المفهوم على المدرسة القروية، نجد أنها تعكس التراتب الاجتماعي، والتنظيم الاقتصادي، والبنية القبلية. التناقض الأكبر يتجلى في أن المدرسة الوطنية بُنيت وخُططت بـ "روح حضرية"، مما يجعلها مؤسسة "محمولة" على فضاء مغاير، مما يخلق "صراع الفضاءات الثقافية".</li>
                            <li><b>تمزق هوياتي للمتعلم:</b> يُعاني المتعلم القروي من فجوة ثقافية واضحة؛ فالمنهاج الوطني موحد ولا يأخذ بعين الاعتبار الخصوصيات اللغوية والمجالية للقرية. يُطلب من التلميذ أن ينسلخ عن بيئته ليتوافق مع نمط حضري مفروض عليه. هذا يؤدي إلى معاناة التلميذ من ازدواجية حادة بين لغته الأم واللغة المدرسية، مما يعيد إنتاج ثقافة الهروب من المدرسة (الهدر المدرسي).</li>
                        </ul>`
                    }
                ]
            },
            {
                title: "الامتحان التجريبي الثاني",
                questions: [
                    {
                        question: "يربط إميل دوركايم أهداف التربية بالانتقال من مجتمعات 'التضامن الآلي' إلى 'التضامن العضوي'. كيف يمكن قراءة تحولات القرية المغربية ودخول المدرسة إليها وفق هذا المنظور الوظيفي؟",
                        answer: `<ul>
                            <li><b>من التضامن الآلي إلى العضوي:</b> يرى دوركايم أن المدرسة تلعب دوراً أساسياً في تحقيق التضامن الاجتماعي. المجتمعات التقليدية البسيطة تتميز بـ "التضامن الآلي" (روابط القرابة). أما المجتمعات الحديثة، فتتميز بـ "التضامن العضوي" (التخصص والاعتماد المتبادل). المدرسة تقوم بتنشئة الأفراد للاندماج في هذا النظام المعقد.</li>
                            <li><b>تحولات القرية المغربية:</b> القرية كانت تمثل مجالاً معزولاً يسيطر عليه "التضامن الآلي". لكن مع التحولات الحديثة، أصبحت المدرسة القروية مؤشراً على انخراط القرية في "الدولة الحديثة"، أي الانتقال نحو "التضامن العضوي". أدى التمدرس إلى تحولات كبروز قيم الفردانية والمواطنة، وتخصص الأدوار (مثل بروز المرأة المتمدرسة كفاعل رمزي جديد)، مما يكسر العزلة الآلية نحو تنظيم عضوي.</li>
                        </ul>`
                    },
                    {
                        question: "بناءً على 'نظرية الفعل الاجتماعي' لماكس فيبر وأنواع الفعل البشري، كيف يمكن تفسير الإقبال على التعليم التقليدي المغربي وتأسيس 'المدارس الحرة' كمقاومة للاستعمار؟",
                        answer: `<ul>
                            <li><b>أنواع الفعل الاجتماعي عند فيبر:</b> يُقسّم فيبر الفعل الاجتماعي إلى: "الفعل العقلاني الغائي"، "الفعل العقلاني القيمي"، و"الفعل التقليدي".</li>
                            <li><b>الفعل التقليدي والقيمي (التعليم التقليدي):</b> الإقبال التاريخي على التعليم التقليدي (الكتاتيب) كان يجمع بين الفعل "التقليدي" (المحافظة على التقاليد) والفعل "العقلاني القيمي". الغاية الأساسية كانت تحصيل العلوم الشرعية، وهو التزام ديني وأخلاقي يبرر هذا الفعل.</li>
                            <li><b>الفعل العقلاني القيمي (المدارس الحرة):</b> حين فرض المستعمر تعليماً يهدف لطمس الهوية، جاء تأسيس "المدارس الحرة" כفعل اجتماعي يحمل معنى "المقاومة". هذا الفعل يُصنف كـ "فعل عقلاني قيمي"، لأن الوطنيين أسسوا هذه المدارس التزاماً بالهوية والواجب القومي، بغض النظر عن قوة المستعمر. إرسال الأبناء إليها كان فعلاً واعياً غرضه التلاحم الاجتماعي.</li>
                        </ul>`
                    }
                ]
            }
        ];

        let currentExamIndex = null;
        let currentQuestionIndex = 0;

        // تهيئة واجهة اختيار الامتحانات
        function initApp() {
            const examsList = document.getElementById('exams-list');
            examsList.innerHTML = '';
            
            examsData.forEach((exam, index) => {
                const examCard = document.createElement('button');
                examCard.className = 'bg-white border-2 border-indigo-100 p-8 rounded-2xl shadow-sm hover:shadow-xl hover:border-indigo-400 transition-all duration-300 text-right group transform hover:-translate-y-1';
                examCard.onclick = () => startExam(index);
                examCard.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="bg-indigo-100 p-3 rounded-full text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition">
                            <i class="fa-solid fa-file-pen text-xl"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-400">${exam.questions.length} أسئلة</span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${exam.title}</h3>
                    <p class="text-slate-500 text-sm font-semibold">اضغط للبدء في الاختبار والمراجعة</p>
                `;
                examsList.appendChild(examCard);
            });
        }

        // بدء الامتحان المحدد
        function startExam(index) {
            currentExamIndex = index;
            currentQuestionIndex = 0;
            
            document.getElementById('exam-selection').style.display = 'none';
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('fade-in');
            
            document.getElementById('exam-title-display').innerText = examsData[currentExamIndex].title;
            
            loadQuestion();
        }

        // تحميل وعرض السؤال الحالي
        function loadQuestion() {
            const exam = examsData[currentExamIndex];
            const qData = exam.questions[currentQuestionIndex];
            
            // تحديث العداد
            document.getElementById('question-counter').innerText = `سؤال ${currentQuestionIndex + 1} من ${exam.questions.length}`;
            
            // وضع النص
            document.getElementById('question-text').innerText = qData.question;
            document.getElementById('answer-text').innerHTML = qData.answer;
            
            // إعادة ضبط الواجهة (إخفاء الجواب)
            document.getElementById('answer-container').classList.add('hidden');
            document.getElementById('navigation-buttons').classList.add('hidden');
            document.getElementById('show-answer-btn-container').classList.remove('hidden');
            
            // إضافة حركة خفيفة للسؤال الجديد
            const qContainer = document.getElementById('question-container');
            qContainer.classList.remove('fade-in');
            void qContainer.offsetWidth; // Trigger reflow
            qContainer.classList.add('fade-in');
        }

        // إظهار التصحيح
        function showAnswer() {
            document.getElementById('show-answer-btn-container').classList.add('hidden');
            
            const answerContainer = document.getElementById('answer-container');
            answerContainer.classList.remove('hidden');
            
            const navButtons = document.getElementById('navigation-buttons');
            navButtons.classList.remove('hidden');
            navButtons.classList.add('flex');

            // تغيير نص زر "السؤال الموالي" إذا كنا في السؤال الأخير
            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIndex === examsData[currentExamIndex].questions.length - 1) {
                nextBtn.innerHTML = 'إنهاء الامتحان <i class="fa-solid fa-check ml-2"></i>';
                nextBtn.classList.replace('bg-emerald-500', 'bg-blue-600');
                nextBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-blue-700');
            } else {
                nextBtn.innerHTML = 'السؤال الموالي <i class="fa-solid fa-arrow-left mr-2"></i>';
                nextBtn.classList.replace('bg-blue-600', 'bg-emerald-500');
                nextBtn.classList.replace('hover:bg-blue-700', 'hover:bg-emerald-600');
            }
        }

        // الانتقال للسؤال الموالي أو إنهاء الامتحان
        function nextQuestion() {
            if (currentQuestionIndex < examsData[currentExamIndex].questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                returnToMenu();
            }
        }

        // العودة للقائمة الرئيسية
        function returnToMenu() {
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('exam-selection').style.display = 'block';
            
            // إعادة تفعيل الحركة للقائمة
            const examSel = document.getElementById('exam-selection');
            examSel.classList.remove('fade-in');
            void examSel.offsetWidth;
            examSel.classList.add('fade-in');
        }

        // بدء تشغيل التطبيق عند تحميل الصفحة
        window.onload = initApp;
    </script>
</body>
</html>
